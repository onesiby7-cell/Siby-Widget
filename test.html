<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Siby Widget</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    p {
      font-size: 1.1rem;
      opacity: 0.85;
    }

    .arrow {
      position: fixed;
      bottom: 30px;
      right: 100px;
      font-size: 1.5rem;
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateX(0);
      }

      50% {
        transform: translateX(10px);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚀 Test Siby-Widget SaaS</h1>
    <p>Cliquez sur la bulle en bas à droite pour tester votre assistant IA → </p>
  </div>

  <div class="arrow">👉</div>
  <!--
    ⚠️ REMPLACEZ les valeurs ci-dessous :
    - src : l'URL de votre widget.js (localhost en dev, ou CDN en prod)
    - data-agent-id : l'UUID de l'agent dans votre table Supabase "agents"
  -->
  <script src="https://dashboard-zeta-sand-24.vercel.app/widget.js" data-agent-id="64873b40-3c26-49a1-b829-21ac559be2d5"
    async></script>
</body>

</html>
